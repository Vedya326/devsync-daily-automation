name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name "DevSync Automation"
          git config --global user.email "23f1002633@ds.study.iitm.ac.in"

      - name: Daily Commit by 23f1002633@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update - $(date)" || echo "No changes to commit"
          git push
